<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarFlip — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .card-img { object-fit: cover; width: 100%; height: 180px; background: #f3f4f6; }
    .badge-down { background: #dcfce7; color: #16a34a; }
    .badge-up { background: #fee2e2; color: #dc2626; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Header -->
  <header class="bg-white shadow-sm sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="text-2xl font-bold text-blue-700">CarFlip</span>
        <span class="text-sm text-gray-400">Avisos de autos en Chile</span>
      </div>
      <span id="total-badge" class="text-sm bg-blue-100 text-blue-700 px-3 py-1 rounded-full hidden"></span>
    </div>
  </header>

  <!-- Filtros -->
  <div class="max-w-7xl mx-auto px-4 py-4">
    <div class="bg-white rounded-xl shadow-sm p-4 flex flex-wrap gap-3 items-end">
      <div class="flex flex-col gap-1">
        <label class="text-xs text-gray-500 font-medium">Fuente</label>
        <select id="f-source" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">Todas</option>
          <option value="autocosmos">AutoCosmos</option>
          <option value="mercadolibre">MercadoLibre</option>
        </select>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs text-gray-500 font-medium">Marca</label>
        <input id="f-marca" type="text" placeholder="Toyota, Chevrolet…"
          class="border border-gray-200 rounded-lg px-3 py-2 text-sm w-36 focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs text-gray-500 font-medium">Modelo</label>
        <input id="f-modelo" type="text" placeholder="Corolla, Sail…"
          class="border border-gray-200 rounded-lg px-3 py-2 text-sm w-36 focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs text-gray-500 font-medium">Año</label>
        <input id="f-anio" type="number" placeholder="2020"
          class="border border-gray-200 rounded-lg px-3 py-2 text-sm w-24 focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs text-gray-500 font-medium">Resultados</label>
        <select id="f-limit" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="50">50</option>
          <option value="100">100</option>
          <option value="200">200</option>
        </select>
      </div>
      <button onclick="fetchListings()"
        class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-medium transition-colors">
        Buscar
      </button>
      <button onclick="clearFilters()"
        class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-2 rounded-lg text-sm transition-colors">
        Limpiar
      </button>
    </div>
  </div>

  <!-- Grid de cards -->
  <main class="max-w-7xl mx-auto px-4 pb-10">
    <div id="loading" class="text-center py-20 text-gray-400 hidden">
      <svg class="animate-spin h-8 w-8 mx-auto mb-3 text-blue-500" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
      </svg>
      Cargando avisos…
    </div>
    <div id="empty" class="text-center py-20 text-gray-400 hidden">Sin resultados para los filtros seleccionados.</div>
    <div id="error-msg" class="text-center py-10 text-red-500 hidden"></div>
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>
  </main>

<script>
  const SOURCE_LABELS = { autocosmos: "AutoCosmos", mercadolibre: "MercadoLibre" };
  const SOURCE_COLORS = {
    autocosmos: "bg-orange-100 text-orange-700",
    mercadolibre: "bg-yellow-100 text-yellow-700",
  };

  function fmt(n) {
    if (n == null) return "—";
    return new Intl.NumberFormat("es-CL").format(n);
  }

  function deltaBadge(delta) {
    if (delta == null) return "";
    const sign = delta < 0 ? "▼" : "▲";
    const cls = delta < 0 ? "badge-down" : "badge-up";
    return `<span class="text-xs font-semibold px-2 py-0.5 rounded-full ${cls}">${sign} ${Math.abs(delta).toFixed(1)}%</span>`;
  }

  function renderCard(l) {
    const srcLabel = SOURCE_LABELS[l.source] || l.source;
    const srcColor = SOURCE_COLORS[l.source] || "bg-gray-100 text-gray-700";
    const img = l.url_imagen
      ? `<img class="card-img rounded-t-xl" src="${l.url_imagen}" alt="${l.titulo}" loading="lazy"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : "";
    const placeholder = `<div class="card-img rounded-t-xl flex items-center justify-center text-gray-300 text-4xl bg-gray-100" ${l.url_imagen ? 'style="display:none"' : ""}>🚗</div>`;
    const precio = l.precio != null
      ? `<span class="text-lg font-bold text-gray-900">${fmt(l.precio)} <span class="text-xs font-normal text-gray-400">${l.moneda}</span></span>`
      : `<span class="text-gray-400 text-sm">Precio no informado</span>`;
    const kmStr = l.km != null ? `${fmt(l.km)} km` : "";
    const meta = [l.anio, kmStr, l.ubicacion, l.combustible].filter(Boolean).join(" · ");

    return `
      <a href="${l.url}" target="_blank" rel="noopener noreferrer"
         class="bg-white rounded-xl shadow-sm hover:shadow-md transition-shadow overflow-hidden flex flex-col">
        ${img}${placeholder}
        <div class="p-4 flex flex-col gap-2 flex-1">
          <div class="flex items-start justify-between gap-2">
            <span class="text-xs px-2 py-0.5 rounded-full font-medium ${srcColor}">${srcLabel}</span>
            ${deltaBadge(l.delta_pct)}
          </div>
          <p class="text-sm font-medium text-gray-800 line-clamp-2 leading-snug">${l.titulo}</p>
          ${precio}
          ${meta ? `<p class="text-xs text-gray-400">${meta}</p>` : ""}
        </div>
      </a>`;
  }

  async function fetchListings() {
    const grid = document.getElementById("grid");
    const loading = document.getElementById("loading");
    const empty = document.getElementById("empty");
    const errMsg = document.getElementById("error-msg");
    const badge = document.getElementById("total-badge");

    grid.innerHTML = "";
    empty.classList.add("hidden");
    errMsg.classList.add("hidden");
    loading.classList.remove("hidden");
    badge.classList.add("hidden");

    const params = new URLSearchParams();
    const source = document.getElementById("f-source").value;
    const marca  = document.getElementById("f-marca").value.trim();
    const modelo = document.getElementById("f-modelo").value.trim();
    const anio   = document.getElementById("f-anio").value.trim();
    const limit  = document.getElementById("f-limit").value;

    if (source)  params.set("source", source);
    if (marca)   params.set("marca", marca);
    if (modelo)  params.set("modelo", modelo);
    if (anio)    params.set("anio", anio);
    params.set("limit", limit);

    try {
      const res = await fetch(`/api/listings?${params}`);
      if (!res.ok) throw new Error(`Error ${res.status}`);
      const data = await res.json();

      loading.classList.add("hidden");
      if (data.length === 0) {
        empty.classList.remove("hidden");
      } else {
        grid.innerHTML = data.map(renderCard).join("");
        badge.textContent = `${data.length} avisos`;
        badge.classList.remove("hidden");
      }
    } catch (e) {
      loading.classList.add("hidden");
      errMsg.textContent = `No se pudo cargar los datos: ${e.message}`;
      errMsg.classList.remove("hidden");
    }
  }

  function clearFilters() {
    document.getElementById("f-source").value = "";
    document.getElementById("f-marca").value = "";
    document.getElementById("f-modelo").value = "";
    document.getElementById("f-anio").value = "";
    document.getElementById("f-limit").value = "50";
    fetchListings();
  }

  fetchListings();
</script>
</body>
</html>
